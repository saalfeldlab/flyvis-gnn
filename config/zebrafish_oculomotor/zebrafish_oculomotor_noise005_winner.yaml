# Winner config: zebrafish_oculomotor_noise005_winner.yaml
# Source: iter_019_slot_02 (connectivity_R2 = 0.918)
# Exploration: 64 iterations, 6 blocks
# Date: 2026-03-25
#
# Why this is the winner:
#   - DAL=93 with W_L1=1e-4 maximizes training volume while avoiding overtraining
#   - Noise=0.05 breaks linear degeneracy, lifting conn_R2 from ~0.02 (clean) to 0.918
#
# Metrics:
#   connectivity_R2: 0.918 (best single seed)
#   robust_mean:     0.688 +/- 0.146 (5 seeds @ DAL=70, CV=22.5%)
#   rollout_pearson: 0.999
#   cluster_accuracy: 0.294
#   spectral_radius: 0.919 (true: 0.900)
#
# Key config differences from baseline:
#   - coeff_W_L1: 1e-5 -> 1e-4 (10x stronger sparsity)
#   - data_augmentation_loop: 160 -> 93 (reduced to avoid overtraining)
#   - coeff_W_sign: 0 (Dale's law hurts)
description: designed by Claude (parallel flyvis)
dataset: zebrafish_oculomotor_noise005_02
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 609
  n_input_neurons: 0
  n_neuron_types: 10
  n_edges: 0
  n_frames: 21000
  delta_t: 0.001
  baseline_value: 0
  noise_model_level: 0.05
  measurement_noise_level: 0.0
  seed: 19002
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/goldman_data
  connconstr_model: zebrafish
  connconstr_use_pretrained: true
graph_model:
