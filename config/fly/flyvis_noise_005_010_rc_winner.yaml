# Winner config: flyvis_noise_005_010_rc_winner.yaml
# Source: iter_045_slot_00 (connectivity_R2 = 0.813)
# Exploration: 56 iterations, 6 blocks
# Date: 2026-03-25
#
# Why this is the winner:
#   - Recurrent training (time_step=5) acts as implicit denoiser under high measurement noise
#   - g_phi_L1=0.0 breakthrough: removing g_phi weight L1 gives full expressivity (+10% over baseline)
#   - lr_W=5e-4 optimal (lower than default 9e-4 — prevents over-training with recurrent loss)
#   - batch_size=32 provides noise averaging across samples
#   - Fine-tuned from pretrained baseline checkpoint (flyvis_noise_005_010)
#
# Metrics:
#   connectivity_R2: 0.813 (best, vs 0.739 baseline = +10.0%)
#   tau_R2:          0.955 (+22% over baseline 0.782)
#   V_rest_R2:       0.144
#   rollout_pearson: 0.976
#
# Key config differences from baseline (flyvis_noise_005_010):
#   - recurrent_training: true, time_step: 5
#   - batch_size: 6 -> 32 (noise averaging)
#   - learning_rate_W_start: 0.0009 -> 0.0005 (prevents over-training)
#   - coeff_g_phi_weight_L1: 0.28 -> 0.0 (breakthrough: full g_phi expressivity)
#   - coeff_g_phi_diff: 1200 (up from 750 baseline)
#   - pretrained_model: from flyvis_noise_005_010 best checkpoint

description: "flyvis noise 0.05+meas 0.10 recurrent — LLM winner (W R2=0.813, +10% over baseline)"
dataset: fly/flyvis_noise_005_010
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  measurement_noise_level: 0.1
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  n_epochs: 2
  n_runs: 1
  device: auto
  pretrained_model: ./log/fly/flyvis_noise_005_010/models/best_model_with_0_graphs_1.pt
  recurrent_training: true
  multi_start_recurrent: false
  consecutive_batch: false
  time_step: 5
  batch_size: 32
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 22
  learning_rate_W_start: 0.0005
  learning_rate_start: 0.0018
  learning_rate_embedding_start: 0.002325
  coeff_g_phi_diff: 1200
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0.9
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0.05
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0.0005
  coeff_W_L2: 1.5e-06
  w_init_mode: randn_scaled
  use_gt_edges: true
  regul_annealing_rate: 0
  test_dataset: fly/flyvis_noise_free
  seed: 42
