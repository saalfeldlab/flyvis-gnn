description: "flyvis DAVIS training with measurement noise"
dataset: flyvis_noise_005_006
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  measurement_noise_level: 0.06
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 6
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 30
  lr_W: 0.0009
  lr: 0.0018
  lr_embedding: 0.002325
  coeff_g_phi_diff: 1200
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0.9
  coeff_g_phi_weight_L1: 0.28
  coeff_f_theta_weight_L1: 0.05
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0.00015
  coeff_W_L2: 1.5e-06
  w_init_mode: "randn_scaled"
  use_gt_edges: true
  regul_annealing_rate: 0
  seed: 42
claude:
  n_epochs: 1
  data_augmentation_loop: 20
  n_iter_block: 12
  ucb_c: 1.414
  node_name: a100
  generate_data: true
  training_time_target_min: 60
  n_parallel: 4
  interaction_code: true
  case_study: "measurement_noise"
  case_study_brief: "Train GNN on noisy voltage measurements. Voltage observations are corrupted by Gaussian noise (measurement_noise_level=0.05). Both the input voltage and derivative targets are noisy. The GNN must learn connectivity from corrupted observations. Key questions: what regularization strengths work best under measurement noise? Does multi-epoch training help? How does the connectivity R2 ceiling compare to the clean case?"
