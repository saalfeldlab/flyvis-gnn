description: 'flyvis_63_1 parameters adapted for noise_005_INR exploration — reference benchmark.
  Original: DAVIS noise 0.05 64K frames NNR_f LR 1E-8 hidden 4096 + 62_1 GNN params
  (lr_W=5E-4 lr=1.2E-3 lr_emb=1.5E-3 batch=1 edge_diff=750 phi_L1=0.5 edge_L1=0.5)'
dataset: flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  field_type: visual
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
  inr_type: siren_txy
  input_size_nnr_f: 3
  hidden_dim_nnr_f: 4096
  n_layers_nnr_f: 3
  outermost_linear_nnr_f: true
  output_size_nnr_f: 1
  nnr_f_xy_period: 1.0
  nnr_f_T_period: 64000
  omega_f: 4096
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 3
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 1
  batch_ratio: 1
  sparsity: none
  data_augmentation_loop: 25
  lr_W: 0.0005
  lr: 0.0012
  lr_embedding: 0.0015
  lr_NNR_f: 1.0e-08
  coeff_g_phi_diff: 750
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 1.0
  coeff_g_phi_weight_L1: 0.5
  coeff_f_theta_weight_L1: 0.5
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 5.0e-05
  w_init_mode: zeros
  use_gt_edges: true
  regul_annealing_rate: 0
  seed: 42
