  coeff_W_L1: 0.0005
  coeff_W_L2: 1.5e-06
  w_init_mode: randn_scaled
  use_gt_edges: true
  regul_annealing_rate: 0
  seed: 53500
  test_dataset: fly/flyvis_noise_free
claude:
  n_epochs: 2
  data_augmentation_loop: 30
  n_iter_block: 16
  ucb_c: 1.414
  n_parallel: 4
  node_name: h100
  generate_data: false
  training_time_target_min: 120
