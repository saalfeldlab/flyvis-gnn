# Known ODE + SIREN joint training
# Model: flyvis_known_ode — linear ODE with learnable tau, V_rest, W
#   dv/dt = (-v + W @ ReLU(v) + stimulus_SIREN + V_rest) / tau
# SIREN replaces stimulus input (field_type=visual, siren_txy)
# Alternate training: full lr_W in epoch 0, then 0.05x in epochs 1+

description: "flyvis noise=0.05 joint known_ode+SIREN. 3 epochs, alternate training. SIREN: 2048 hidden, 4L, omega=4096, lr_NNR_f=1e-8."
dataset: flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  derivative_smoothing_window: 1
  seed: 42
graph_model:
  signal_model_name: flyvis_known_ode
  prediction: first_derivative
  field_type: visual
  input_size: 1
  n_layers: 1
  hidden_dim: 1
  output_size: 1
  input_size_update: 1
  n_layers_update: 1
  hidden_dim_update: 1
  aggr_type: add
  embedding_dim: 0
  update_type: linear
  g_phi_positive: false
  inr_type: siren_txy
  input_size_nnr_f: 3
  hidden_dim_nnr_f: 2048
  n_layers_nnr_f: 4
  outermost_linear_nnr_f: true
  output_size_nnr_f: 1
  nnr_f_xy_period: 1.0
  nnr_f_T_period: 64000
  omega_f: 4096
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 3
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 1
  batch_ratio: 1
  sparsity: none
  data_augmentation_loop: 25
  lr_W: 0.0009
  lr: 0.0
  lr_embedding: 0.0
  lr_NNR_f: 1.0e-08
  alternate_training: true
  alternate_lr_ratio: 0.05
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0.00015
  coeff_W_L2: 0
  w_init_mode: randn_scaled
  use_gt_edges: true
  regul_annealing_rate: 0.5  # DO NOT set to 0 — catastrophic with n_epochs=3 (tested 2026-03-26)
  seed: 42
