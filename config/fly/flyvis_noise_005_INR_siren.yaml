description: "flyvis DAVIS training noise_model_level 0.05 with SIREN visual field"
dataset: flyvis_noise_005_INR_siren
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  field_type: visual
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
  inr_type: siren_txy
  input_size_nnr_f: 3
  hidden_dim_nnr_f: 2048
  n_layers_nnr_f: 3
  outermost_linear_nnr_f: true
  output_size_nnr_f: 1
  nnr_f_xy_period: 1.0
  nnr_f_T_period: 64000
  omega_f: 2048
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 4
  n_runs: 1
  device: auto
  recurrent_training: false
  use_gt_edges: true
  batch_size: 16
  batch_ratio: 1
  sparsity: none
  data_augmentation_loop: 25
  lr_W: 1.0e-03
  lr: 5.0e-04
  lr_embedding: 1.0e-03
  lr_NNR_f: 1.0e-08
  coeff_g_phi_diff: 500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 1.0
  coeff_g_phi_weight_L1: 1
  coeff_f_theta_weight_L1: 1
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 5.0e-05
  coeff_W_L1_rate: 0.5
  regul_annealing_rate: 0
  seed: 42
claude:
  n_epochs: 4
  data_augmentation_loop: 25
  n_iter_block: 12
  ucb_c: 1.414
  node_name: a100
  generate_data: true
  training_time_target_min: 240
  interaction_code: false
  case_study: "standalone_siren_long"
  case_study_brief: >-
    Standalone SIREN visual field reconstruction — continuing the noise_005_INR exploration
    with 4x training budget (240 min instead of 60 min). Goal: break through the R2~0.50
    ceiling at 64k frames by allowing much longer training.
    Run 5 blocks scaling n_frames: Block 1 = 1000 frames, Block 2 = 10000, Block 3 = 20000,
    Block 4 = 40000, Block 5 = 64000.
    Start from the best known configs at each scale (from previous exploration):
    1000f: dim=256/5L, omega=30, lr=2e-5, batch=50 (prev best R2=0.992 in 39 min);
    10000f: dim=384/5L, omega=30, lr=5e-6, batch=50 (prev best R2=0.794 in 59 min);
    20000f: dim=384/7L, omega=30, lr=5e-6, batch=50 (prev best R2=0.691 in 57 min);
    40000f: dim=384/7L, omega=30, lr=5e-6, batch=150 (prev best R2=0.586 in 60 min);
    64000f: dim=256/7L, omega=30, lr=5e-6, batch=200 (prev best R2=0.495 in 52 min).
    With 4x budget, explore: more training steps, lower learning rates, larger batch sizes,
    deeper/wider architectures. Target: R2 > 0.7 at 64k frames, R2 > 0.9 at 1000-10000 frames.
