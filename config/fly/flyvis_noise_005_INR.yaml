description:
  "flyvis noise_005 joint GNN+SIREN (iter 21-24 best: conn_R2=0.942, field_R2=0.709).
  3 epochs, alternate training (GNN LRs x0.05 in epochs 1+).
  SIREN: 2048 hidden, 4 layers, omega=4096, lr_NNR_f=1e-8. GNN hidden=80."
dataset: flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  field_type: visual
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
  inr_type: siren_txy
  input_size_nnr_f: 3
  hidden_dim_nnr_f: 2048
  n_layers_nnr_f: 4
  outermost_linear_nnr_f: true
  output_size_nnr_f: 1
  nnr_f_xy_period: 1.0
  nnr_f_T_period: 64000
  omega_f: 4096
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 3
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 1
  batch_ratio: 1
  sparsity: none
  data_augmentation_loop: 25
  lr_W: 0.0005
  lr: 0.0012
  lr_embedding: 0.0015
  lr_NNR_f: 1.0e-08
  alternate_training: true
  alternate_lr_ratio: 0.05
  coeff_g_phi_diff: 750
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 1.0
  coeff_g_phi_weight_L1: 0.5
  coeff_f_theta_weight_L1: 0.5
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 5.0e-05
  coeff_W_L1_rate: 0.5
  w_init_mode: randn_scaled
  use_gt_edges: true
  regul_annealing_rate: 0.5  # DO NOT set to 0 — catastrophic with n_epochs=3 (tested 2026-03-26). Unlike GNN-only (n_epochs=1), joint INR training needs annealing active.
  seed: 42
claude:
  n_epochs: 3
  data_augmentation_loop: 25
  n_iter_block: 12
  ucb_c: 1.414
  node_name: h100
  generate_data: true
  training_time_target_min: 360
  interaction_code: false
  case_study: "joint_gnn_siren"
  case_study_brief: "Joint GNN+SIREN with alternate training (flyvis_63_2 base): full GNN LRs in epoch 0, then 0.05x GNN LRs in epochs 1+. SIREN LR unchanged throughout. Goal: connectivity_R2 > 0.9 AND field_R2 > 0.7."
