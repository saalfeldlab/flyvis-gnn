# Winner config: flyvis_noise_free_winner.yaml
# Source: iter_137_slot_00 (connectivity_R2 = 0.935, best single seed)
# Exploration: 156 iterations, 13 blocks
# Date: 2026-03-25
#
# Why this is the winner:
#   - batch_size=4 eliminated catastrophic failures (37% failure rate at bs=2)
#   - aug_loop=30 is the optimal gradient budget for bs=4
#   - embedding_dim=4 eliminated structural failures (Block 6 breakthrough)
#   - g_phi_diff=1500 bracketed from both sides (1200 and 1800 both worse)
#
# Metrics:
#   connectivity_R2: 0.935 (best single seed)
#   robust_mean:     0.923 +/- 0.008 (4 seeds, CV=0.82%)
#   rollout_pearson: 0.997
#   tau_R2:          0.568
#   V_rest_R2:       0.065
#
# Key config differences from baseline:
#   - batch_size: 2 -> 4 (eliminates catastrophic failures)
#   - data_augmentation_loop: 20 -> 30 (optimal for bs=4)
#   - lr: 0.0012 -> 0.0018 (1.5x, most impactful single lever)
#   - lr_emb: 0.001 -> 0.00155
#   - embedding_dim: 2 -> 4 (eliminates structural failures)
#   - coeff_g_phi_diff: 750 -> 1500 (optimal monotonicity)
#   - All L1/L2 regularizers off (irrelevant with 1-epoch training)

description: "flyvis noise-free — LLM exploration winner (W R2=0.923, CV=0.82%)"
dataset: flyvis_noise_free
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.0
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 5
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 7
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 4
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  time_step: 1
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 30
  learning_rate_W_start: 0.0006
  learning_rate_start: 0.0018
  learning_rate_embedding_start: 0.00155
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_f_theta_linearity: 0
  w_init_mode: randn_scaled
  use_gt_edges: true
  lr_scheduler: none
  seed: 42
