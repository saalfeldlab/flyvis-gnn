# Known ODE baseline
# Model: flyvis_known_ode — linear ODE with learnable tau, V_rest, W
#   dv/dt = (-v + W @ ReLU(v) + stimulus + V_rest) / tau
# No MLP (g_phi = ReLU, f_theta = linear), no embeddings

description: "flyvis noise-free known_ode"
dataset: fly/flyvis_noise_free
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.0
  seed: 42
graph_model:
  signal_model_name: flyvis_known_ode
  prediction: first_derivative
  input_size: 1
  n_layers: 1
  hidden_dim: 1
  output_size: 1
  input_size_update: 1
  n_layers_update: 1
  hidden_dim_update: 1
  aggr_type: add
  embedding_dim: 0
  update_type: linear
  g_phi_positive: false
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 30
  lr_W: 0.0006
  lr: 0.0018
  lr_embedding: 0.0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  w_init_mode: randn_scaled
  use_gt_edges: true
  regul_annealing_rate: 0
  seed: 42
