description: "flyvis Hodgkin-Huxley (continuous spiking, voltage-style Euler integration)"
dataset: flyvis_hodgkin_huxley
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 0          # 0 = use each source frame exactly once
  delta_t: 0.5         # ms — stimulus frame rate (each frame held for 0.5ms)
  baseline_value: 0
  visual_input_type: DAVIS
  max_train_sequences: 20
  noise_model_level: 0.0
  seed: 42
  # HH-specific
  hh_substeps: 50        # Euler substeps per stimulus frame (sub_dt = 0.5/50 = 0.01ms)
  hh_stim_scale: 50.0    # uA/cm^2 per unit stimulus
  hh_I_bias: 3.0         # uA/cm^2 — tonic drive (depolarises to ~-44mV, subthreshold)
  hh_w_scale: 5.0        # global W multiplier (connectome weights calibrated for graded model)
graph_model:
  signal_model_name: flyvis_hodgkin_huxley
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 35
  learning_rate_W_start: 0.0009
  learning_rate_start: 0.0018
  learning_rate_embedding_start: 0.002325
  coeff_g_phi_diff: 750
  coeff_g_phi_norm: 0.9
  coeff_g_phi_weight_L1: 0.28
  coeff_f_theta_weight_L1: 0.05
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0.00015
  coeff_W_L2: 1.5e-06
  w_init_mode: "randn_scaled"
  regul_annealing_rate: 0.5
  seed: 43
