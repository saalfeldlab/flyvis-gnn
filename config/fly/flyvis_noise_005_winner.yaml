# Winner config: flyvis_noise_005_winner.yaml
# Source: iter_161_slot_00 (connectivity_R2 = 0.985, best single seed)
# Exploration: 168 iterations, 14 blocks (LLM_flyvis_noise_005)
# Date: 2026-03-26
#
# Why this is the winner:
#   - batch_size=4 eliminates catastrophic failures
#   - data_augmentation_loop=35 is the optimal gradient budget (aug=30 → 0.961, aug=35 → 0.982)
#   - regul_annealing_rate=0.5 re-activates L1/L2 at ~39% by epoch 1
#     (critical: n_epochs=1 + rate=0 → all L1/L2 completely inactive)
#   - W_L1=1.5e-4 provides sparsity regularization (bracketed from both sides)
#   - 1.5x LRs (lr_W=9e-4, lr=1.8e-3) vs noise-free baseline (lr_W=6e-4, lr=1.2e-3)
#   - embedding_dim=2 (noise=0.05 is simpler than noise-free; emb=4 not needed)
#
# Metrics:
#   connectivity_R2: 0.985 (best single seed, iter_161_slot_00)
#   robust_mean:     0.982 +/- 0.003 (4 seeds, CV=0.30%, all seeds > 0.97)
#   rollout_pearson: 0.991 (mean over 13741 neurons)
#   tau_R2:          ~0.64 (mean over 4 seeds)
#   V_rest_R2:       ~0.34 (bimodal, range 0.22-0.49; unsolved frontier)
#
# Key config differences from noise-free winner:
#   - noise_model_level: 0.0 -> 0.05
#   - data_augmentation_loop: 30 -> 35
#   - embedding_dim: 4 -> 2  (input_size: 5->3, input_size_update: 7->5)
#   - regul_annealing_rate: 0 -> 0.5  (re-activates L1/L2 in 1-epoch training)
#   - coeff_W_L1: 0 -> 1.5e-4
#   - coeff_W_L2: 0 -> 1.5e-6
#   - coeff_g_phi_weight_L1: 0 -> 0.28
#   - coeff_f_theta_weight_L1: 0 -> 0.05
#   - coeff_f_theta_weight_L2: 0 -> 0.001
#   - coeff_g_phi_diff: 1500 -> 750  (lower optimal for noisy data)
#   - coeff_g_phi_norm: 0 -> 0.9

description: "flyvis noise=0.05 — LLM exploration winner (W R2=0.982, CV=0.30%)"
dataset: flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  derivative_smoothing_window: 1
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  time_step: 1
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 35
  lr_W: 0.0009
  lr: 0.0018
  lr_embedding: 0.002325
  coeff_g_phi_diff: 750
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0.9
  coeff_g_phi_weight_L1: 0.28
  coeff_f_theta_weight_L1: 0.05
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  regul_annealing_rate: 0.0
  coeff_W_L1: 0.00015
  coeff_W_L2: 1.5e-06
  coeff_f_theta_linearity: 0
  f_theta_linearity_warmup_fraction: 0.3
  f_theta_linearity_rampup_iters: 200
  coeff_f_theta_centering: 0
  coeff_V_rest: 0
  V_rest_warmup_fraction: 0.3
  V_rest_rampup_iters: 200
  V_rest_eval_every: 10
  w_init_mode: randn_scaled
  use_gt_edges: true
  lr_scheduler: none
  lr_scheduler_T0: 1000
  lr_scheduler_T_mult: 2
  lr_scheduler_eta_min_ratio: 0.01
  lr_scheduler_warmup_iters: 100
  seed: 42
