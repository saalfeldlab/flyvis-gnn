# Winner config: drosophila_cx_noise005_winner.yaml
# Source: iter_016_slot_03 (connectivity_R2 = 0.938)
# Exploration: 16 iterations, 2 blocks
# Date: 2026-03-25
#
# Why this is the winner:
#   - W_L2=3e-5 was the key improvement from Block 2, tripling L2 from baseline 1e-5
#   - Lucky seed achieved 0.938, but mean across 4 seeds is 0.642 (CV=31%) — high variance
#
# Metrics:
#   connectivity_R2: 0.938 (best single seed)
#   robust_mean:     0.642 +/- 0.199 (4 seeds, CV=31%)
#   rollout_pearson: 0.992
#   cluster_accuracy: 0.322
#   spectral_radius: 2.187 (true: 2.545)
#
# Key config differences from baseline:
#   - coeff_W_L2: 1e-5 -> 3e-5 (stronger L2 regularization for noise)
#   - data_augmentation_loop: 300 -> 100 (reduced for 60 min training time)
