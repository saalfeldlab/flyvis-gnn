description: "Drosophila CX — Linear ODE baseline, seed 00"
dataset: drosophila_cx
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
  n_neurons: 152
  n_input_neurons: 0
  n_neuron_types: 6
  n_edges: 0
  n_frames: 10000
  delta_t: 0.1
  baseline_value: 0
  noise_model_level: 0.0
  seed: 42
  connconstr_datapath: "papers/Code_NN/Code_NN/Data/Figure5"
  connconstr_model: drosophila_cx
  connconstr_n_trials: 50
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: drosophila_cx_known_ode
  prediction: first_derivative
  input_size: 5
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 7
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 4
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -5
    - 5
training:
  n_epochs: 20
  n_runs: 1
  device: auto
  batch_size: 2
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 500
  lr_W: 0.001
  lr: 0.001
  lr_embedding: 0.001
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 1.5e-06
  coeff_W_sign: 0.0
  regul_annealing_rate: 0
  w_init_mode: "zeros"
  seed: 42
