# Winner config: drosophila_cx_winner.yaml
# Source: iter_104_slot_03 (connectivity_R2 = 0.804, lucky seed)
# Robust baseline: DAL=200 mean conn_R2 = 0.574 +/- 0.18 (22 seeds)
# Exploration: 108 iterations, 10 blocks
# Date: 2026-03-25
#
# Why this is the winner:
#   - FC mode with optimized hyperparams: lr_W=5e-5 (slow W convergence),
#     W_L1=3e-6 (sparsity), W_sign=0.01 (spectral stabilizer), emb=2+hd=64
#   - 39 parameter mutations tested — this config survived exhaustive search
#
# Metrics (best single seed, Iter 104):
#   connectivity_R2: 0.804
#   robust_mean:     0.574 +/- 0.180 (22 seeds at DAL=200, CV=31%)
#   rollout_pearson: 0.997
#   cluster_accuracy: 0.421
#   spectral_radius: 2.537 (true: 2.545)
#
# Key config differences from initial baseline:
#   - lr_W: 3e-4 -> 5e-5 (10x reduction — biggest single improvement)
#   - embedding_dim: 4 -> 2 (second biggest improvement, +80%)
#   - hidden_dim: 80 -> 64 (matched to emb=2)
#   - coeff_W_sign: 0 -> 0.01 (stabilizes training, 92% convergence)
#   - coeff_W_L1: 5e-6 -> 3e-6 (fine-tuned sparsity)
#   - n_epochs: 1 -> 2 (more training volume)
#   - data_augmentation_loop: 500 -> 200 (time-budget optimized)
#
description: designed by Claude (parallel flyvis)
dataset: drosophila_cx_winner
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 49
  n_input_neurons: 0
  n_neuron_types: 6
  n_edges: 0
  n_frames: 10000
  delta_t: 0.1
  baseline_value: 0
  noise_model_level: 0.0
  derivative_smoothing_window: 1
  seed: 0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5
  connconstr_model: drosophila_cx
  connconstr_n_trials: 50
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: drosophila_cx
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: sum
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -5
  - 5
training:
  n_epochs: 2
  n_runs: 1
  device: auto
  batch_size: 2
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 200
  recurrent_training: false
  use_gt_edges: false
  lr_W: 5.0e-05
  lr: 0.001
  lr_embedding: 0.001
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 3.0e-06
  coeff_W_L2: 1.0e-05
  coeff_W_sign: 0.01
  coeff_f_theta_diff: 0
  dale_law: false
  regul_annealing_rate: 0
  w_init_mode: zeros
  w_init_scale: 0.01
  lr_scheduler: none
  lr_scheduler_warmup_iters: 100
  lr_scheduler_T0: 1000
  lr_scheduler_T_mult: 2
  lr_scheduler_eta_min_ratio: 0.01
  seed: 0
