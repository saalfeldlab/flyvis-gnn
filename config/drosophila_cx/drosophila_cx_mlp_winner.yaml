# Winner config: drosophila_cx_mlp_winner.yaml
# Source: iter_010_slot_01 (connectivity_R2 = 0.000, rollout_pearson = 0.666)
# Exploration: 16 iterations, 1 block
# Date: 2026-03-25
#
# Why this is the winner:
#   - lr=5e-4 with DAL=1400 produced best single-seed rollout (0.666) and onestep (0.794)
#   - Robustness test (4 seeds) confirmed mean rollout=0.472 with CV=32% — extreme seed variance
#
# Metrics:
#   connectivity_R2: 0.000 (best single seed: 0.005)
#   robust_mean:     0.472 +/- 0.150 (4 seeds, CV=31.8%)
#   rollout_pearson: 0.666 (best single seed)
#   cluster_accuracy: 0.000
#   spectral_radius: N/A (MLP baseline)
#
# Key config differences from baseline:
#   - lr: 1e-3 -> 5e-4 (halved learning rate, compensated by adequate training budget)
#   - DAL: 500 -> 1400 (increased to fill 60 min time budget)
description: designed by Claude (parallel flyvis)
dataset: drosophila_cx_mlp_01
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 152
  n_input_neurons: 0
  n_neuron_types: 6
  n_edges: 0
  n_frames: 10000
  delta_t: 0.1
  baseline_value: 0
  noise_model_level: 0.0
  seed: 10001
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5
  connconstr_model: drosophila_cx
  connconstr_n_trials: 50
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: drosophila_cx_mlp
  prediction: first_derivative
  input_size: 5
  n_layers: 5
  hidden_dim: 256
  output_size: 1
  input_size_update: 7
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
