  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -5
  - 5
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  batch_size: 2
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 1400
  lr_W: 0
  lr: 0.0005
  lr_embedding: 0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0.0
  regul_annealing_rate: 0
  w_init_mode: zeros
  seed: 10501
claude:
  n_epochs: 1
  data_augmentation_loop: 1400
  n_iter_block: 16
  ucb_c: 0
  n_parallel: 4
  node_name: h100
  generate_data: true
  training_time_target_min: 60
