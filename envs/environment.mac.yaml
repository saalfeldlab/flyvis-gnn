name: flyvis-gnn-mac
channels:
  - pytorch
  - conda-forge

dependencies:
  # Core
  - python=3.12
  - pip=26.0.1

  # Keep the BLAS/OpenMP stack consistent on macOS (no Accelerate pin)
  - "libblas=*=*openblas*"

  # Scientific / data
  - numpy=2.3.3
  - scipy=1.16.2
  - pandas=2.3.3
  - matplotlib=3.10.8
  - seaborn=0.13.2
  - scikit-image=0.26.0
  - dask=2026.3.0
  - umap-learn=0.5.11
  - networkx=3.6.1
  - prettytable=3.17.0
  - pyyaml=6.0.3
  - tqdm=4.67.3
  - tensorboard=2.20.0
  - imageio=2.37.0
  - tifffile=2026.3.3
  - shapely=2.1.2
  - pydantic=2.12.5
  - astropy=7.2.0
  - pyvista=0.47.1
  - vtk=9.5.2 # keep VTK native on conda (pip wheels may bundle their own OMP)
  - opencv=4.12.0 # same reason; avoid pip opencv-python's vendor libs
  - pyqt=5.15.11 # Qt via conda to avoid mixed toolchains
  - pysr=1.5.9
  - pytables=3.11.1 # native HDF5 bindings via conda
  - ipython=9.11.0
  - ipykernel=6.31.0
  - jupytext=1.19.1
  - tensorstore=0.1.65
  - cachetools=7.0.5
  - napari=0.7.0
  - plotly=6.6.0
  - ruff=0.15.7
  - tyro=1.0.10

  # PyTorch on conda (single OpenMP runtime managed by conda)
  - pytorch=2.7.1
  - torchvision=0.23.0
  - torchaudio=2.7.1

  - pip:
      # Keep only packages that aren't well-supported natively on conda
      - geomloss==0.2
      - torch_geometric==2.7.0
      - torchdiffeq==0.2.5
      - vedo==2026.6.1
      - joblib==1.5.3
      - flyvis==1.1.3
      - polars==1.39.3
